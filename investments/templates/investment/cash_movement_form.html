{% extends 'index.html' %}

{% block title %}{{ movement_title }}{% endblock %}

{% block content %}
    <div class="box box-primary">
        <div class="box-header">
            <h3 class="box-title">{{ movement_title }}</h3>
        </div>
        <form method="post">
            <div class="box-body">
                <p class="font-16">{{ movement_description }}</p>
                {% csrf_token %}
                {% for field in form %}
                    <div class="form-group mb-15">
                        {{ field.errors }}
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
            </div>
            <div class="box-footer">
                <input class="btn btn-primary" type="submit" value="Salvar">
                <a href="{% url 'detail_investment' investment.id %}" class="btn btn-info">Voltar</a>
            </div>
        </form>
    </div>
{% endblock %}
